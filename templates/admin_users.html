<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration Utilisateurs - Smart Verbs</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        const savedTheme = localStorage.getItem('smartVerbsTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        th { font-weight: 600; opacity: 0.8; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.9rem; border-radius: 8px; cursor: pointer; }
        .btn-danger { background-color: var(--error); color: white; border:none; }
        .btn-danger:hover { background-color: #dc2626; }
    </style>
</head>
<body>
    <header style="max-width: 800px; margin: 0 auto; padding-top: 1rem;">
        <h1>👥 Gestion des Utilisateurs</h1>
        <div class="header-actions">
            <a href="/admin" class="btn btn-secondary btn-small" style="text-decoration: none;">Retour aux Verbes</a>
            <a href="/" class="btn btn-secondary btn-small" style="text-decoration: none;">Retour au Quiz</a>
        </div>
    </header>

    <main class="admin-container">
        <h2>Liste des utilisateurs</h2>
        <p style="opacity: 0.8; font-size: 0.9rem;">Le compte administrateur <b>root</b> ne peut pas être supprimé depuis cette interface.</p>
        
        <table id="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom d'utilisateur</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Injected via JS -->
            </tbody>
        </table>
    </main>

    <script src="/static/admin_users.js"></script>
</body>
</html>
