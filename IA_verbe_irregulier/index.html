<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Irregular Verbs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Smart Verbs IA</h1>
        <div class="header-actions">
            <button id="export-btn" class="icon-btn" title="Sauvegarder la progression">💾</button>
            <button id="import-btn" class="icon-btn" title="Charger une progression">📂</button>
            <input type="file" id="import-file" style="display: none;" accept=".json">
            <button id="theme-toggle" class="icon-btn theme-toggle" aria-label="Basculer le thème">🌙</button>
        </div>
    </header>

    <main class="container">
        <div id="quiz-view">
            <div class="stats-bar">
                <span id="score-display">🎯 Score: 0</span>
                <span id="accuracy-display">📈 Réussite: 0%</span>
            </div>

            <div class="verb-display">
                <p>Traduisez ce verbe</p>
                <div id="current-verb-fr" class="verb-fr">...</div>
            </div>

            <form id="quiz-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="input-base" placeholder=" " autocomplete="off" autocorrect="off" spellcheck="false">
                        <label for="input-base">Base verbale</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="input-past" placeholder=" " autocomplete="off" autocorrect="off" spellcheck="false">
                        <label for="input-past">Prétérit</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="input-participle" placeholder=" " autocomplete="off" autocorrect="off" spellcheck="false">
                        <label for="input-participle">Participe passé</label>
                    </div>
                </div>
                
                <button type="submit" id="submit-btn" class="btn">Vérifier</button>
            </form>

            <div id="feedback-msg" class="feedback">
                <!-- Injected via JS -->
            </div>
            
            <div class="actions">
                <button id="next-btn" class="btn" style="display: none;">Verbe suivant ➔</button>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
